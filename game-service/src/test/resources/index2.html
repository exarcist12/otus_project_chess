<!DOCTYPE html>
<html>
<head>
    <title>Chess Game - Login & Matchmaking</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        .hidden { display: none; }
        .log { border: 1px solid #ccc; height: 300px; overflow: auto; padding: 10px; margin-top: 20px; }
        input, button { padding: 8px; margin: 5px; }
        .error { color: red; }
        .system { color: blue; }
    </style>
</head>
<body>
<h3>♜ Chess Game</h3>

<div id="loginForm">
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <div id="loginError" class="error"></div>
</div>

<div id="gameContainer" class="hidden">
    <button id="startBtn" onclick="startMatch()">Start</button>
    <div id="matchStatus"></div>
</div>

<div id="chatArea" class="hidden">
    <input type="text" id="message" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<div id="log" class="log"></div>

<script>

    function log(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        const color = type === 'error' ? 'red' : (type === 'system' ? 'blue' : 'black');
        logDiv.innerHTML += `<div style="color:${color}">${new Date().toLocaleTimeString()} - ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function showLoginError(msg) {
        document.getElementById('loginError').innerText = msg;
    }
    let stompClient = null;
    let authenticated = false;
    let currentRoomId = null;
    let roomSubscription = null;
    let playerInfo = null;
    let mySessionId = null;

    function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            showLoginError('Enter username and password');
            return;
        }
        showLoginError('');
        log(`Logging in as ${username}...`);

        const socket = new SockJS('http://localhost:8081/chess-websocket');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function(frame) {
            mySessionId = frame.headers['session-id'];
            log('WebSocket connected. Session: ' + mySessionId, 'system');

            stompClient.subscribe('/topic/login-response', function(msg) {
                const response = JSON.parse(msg.body);
                console.log('Login response received:', response);

                if (response.success) {
                    playerInfo = response.player;
                    authenticated = true;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('gameContainer').classList.remove('hidden');
                    log(`✅ Login successful. Welcome ${playerInfo.name} (rating: ${playerInfo.rating})`, 'system');
                } else {
                    showLoginError('Invalid credentials');
                    log(`❌ Login failed`, 'error');
                }
            });

            stompClient.subscribe('/topic/match-found', function(msg) {
                const event = JSON.parse(msg.body);
                if (playerInfo && event.players.includes(playerInfo.id)) {
                    currentRoomId = event.roomId;
                    log(`🎉 Match found! Room: ${currentRoomId}. You can chat now.`, 'system');
                    document.getElementById('chatArea').classList.remove('hidden');
                    document.getElementById('matchStatus').innerHTML = `In room ${currentRoomId}`;
                    document.getElementById('startBtn').disabled = true;

                    if (roomSubscription) roomSubscription.unsubscribe();
                    roomSubscription = stompClient.subscribe('/topic/room/' + currentRoomId, function(chatMsg) {
                        const message = JSON.parse(chatMsg.body);
                        log(`${message.sender}: ${message.content}`);
                    });
                }
            });

            stompClient.send('/app/login', {}, JSON.stringify({username, password}));
        });
    }

    function startMatch() {
        if (!authenticated) {
            log('You must login first', 'error');
            return;
        }
        stompClient.send('/app/find-match', {}, {});
        log('Searching for opponent...', 'system');
        document.getElementById('matchStatus').innerHTML = 'Searching...';
    }

    function sendMessage() {
        if (!authenticated || !currentRoomId) {
            log('Not in a room', 'error');
            return;
        }
        const content = document.getElementById('message').value.trim();
        if (!content) return;
        const chatMessage = {
            roomId: currentRoomId,
            content: content,
            timestamp: new Date().toLocaleTimeString()
        };
        stompClient.send('/app/chat-room', {}, JSON.stringify(chatMessage));
        document.getElementById('message').value = '';
    }
</script>
</body>
</html>
